name = "wedding-media-storage"
main = "worker/index.ts"
compatibility_date = "2026-05-26"
keep_vars = true

[assets]
directory = "./dist"
binding = "ASSETS"

# Runtime variables should be managed in the Cloudflare dashboard or with
# wrangler secret/secret-file commands. keep_vars prevents local deploys from
# wiping dashboard-managed values.
